name: container_gradient_border
description: Flutter widget that applies a gradient border using CustomPaint. Supports LinearGradient, RadialGradient, and SweepGradient. Sizes to child automatically.
version: 0.1.2
homepage: https://github.com/igloodev/container-gradient-border

screenshots:
  - description: 'LinearGradient card, RadialGradient avatar, SweepGradient pill button, multi-stop gradient input, and focus-state border'
    path: screenshots/example.jpg

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
